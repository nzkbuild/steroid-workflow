kind: module
contract_version: "1.0"

identity:
  id: steroid-spec-system
  status: active
  layer: module
  domain: spec

responsibility:
  summary: Produce the canonical feature specification and planning artifacts for a feature request.
  includes:
    - consume feature_request
    - generate spec_md
    - emit readiness_signal for downstream policy or gate evaluation
    - consume spec_md
    - generate plan_md
  excludes:
    - task generation
    - change delta management
    - artifact graph computation
    - schema resolution
    - spec sync
    - architecture decision capture
    - readiness gate decisions

artifacts:
  consumes:
    - feature_request
    - spec_md
  owns:
    - spec_md
    - plan_md
  emits: []

signals:
  consumes: []
  emits:
    - readiness_signal

state:
  reads: []
  writes: []
  forbidden_writes: []

dependencies:
  modules: []
  lib: []
  adapters: []
  policies:
    - readiness.spec_quality

policy_hooks:
  emits:
    - readiness_signal
  consumes: []

invariants:
  - spec_md must not exist without feature_request
  - readiness_signal must not be emitted without spec_md
  - plan_md must not exist without spec_md
  - plan_md must include explicit technical context

observability:
  events:
    - spec.created
    - spec.readiness_signaled
    - plan.created
  logs:
    - spec_generation_summary
    - plan_generation_summary
  metrics:
    - spec_generation_latency_ms
    - plan_generation_latency_ms
  trace:
    correlation_id_required: true

failure_modes:
  - id: missing_feature_request
    severity: error
  - id: invalid_spec_output
    severity: error
  - id: missing_spec_md
    severity: error
  - id: invalid_plan_output
    severity: error

verification:
  contract:
    - live_mapping_defined
    - spec_structure_preserved
    - plan_structure_preserved
  parity:
    - spec-driven-ordering
    - specification-structure
    - spec-to-plan-ordering
    - planning-structure

performance:
  latency_budget_ms: 4000
  max_context_tokens: 10000

replaceability:
  strategy: internal_swap
  constraints:
    - spec_md identity must remain stable in .memory/changes/<feature>/spec.md
    - plan_md identity must remain stable in .memory/changes/<feature>/plan.md
    - readiness_signal semantics must remain gate-compatible

provenance:
  intake_modes:
    - extracted-native-capability
  live_mapping: governed/spec-system/LIVE-MAPPING.md
  provenance_receipt: governed/spec-system/PROVENANCE.md

compatibility:
  minimum_kernel_version: "1.0"
  deprecated_fields: []
